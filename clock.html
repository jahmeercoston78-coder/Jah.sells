<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            background-color: #333;\n            color: white;\n            font-family: Arial, sans-serif;\n            text-align: center;\n        }\n        #clock {\n            font-size: 48px;\n            margin: 20px;\n            animation: pulse 1s infinite;\n        }\n        @keyframes pulse {\n            0% { transform: scale(1); }\n            50% { transform: scale(1.1); }\n            100% { transform: scale(1); }\n        }\n        select {\n            font-size: 24px;\n        }\n        #toggleFormat {\n            font-size: 24px;\n            margin-top: 20px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Digital Clock</h1>\n    <div id="clock">00:00:00</div>\n    <select id="timezoneSelector">\n        <option value="UTC">UTC</option>\n        <option value="EST">EST</option>\n        <option value="CST">CST</option>\n        <option value="MST">MST</option>\n        <option value="PST">PST</option>\n        <option value="GMT">GMT</option>\n        <option value="CET">CET</option>\n        <option value="IST">IST</option>\n        <option value="JST">JST</option>\n        <option value="AEST">AEST</option>\n    </select>\n    <button id="toggleFormat">12/24 Hour Format</button>\n    <script>\n        const clockElement = document.getElementById('clock');\n        const timezoneSelector = document.getElementById('timezoneSelector');\n        const toggleFormatButton = document.getElementById('toggleFormat');\n        let is12HourFormat = true;\n\n        function updateClock() {\n            const selectedTimeZone = timezoneSelector.value;\n            const date = new Date();\n            const utcTime = date.getTime() + (date.getTimezoneOffset() * 60000);\n            let localTime = new Date(utcTime + (3600000 * getOffset(selectedTimeZone)));\n            let hours = localTime.getHours();\n            const minutes = String(localTime.getMinutes()).padStart(2, '0');\n            const seconds = String(localTime.getSeconds()).padStart(2, '0');\n\n            if (is12HourFormat) {\n                const ampm = hours >= 12 ? 'PM' : 'AM';\n                hours = hours % 12;\n                hours = hours ? hours : 12; // the hour '0' should be '12'\n                clockElement.innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;\n            } else {\n                clockElement.innerText = hours + ':' + minutes + ':' + seconds;\n            }\n        }\n\n        function getOffset(timeZone) {\n            const offsets = {\n                'UTC': 0,\n                'EST': -5,\n                'CST': -6,\n                'MST': -7,\n                'PST': -8,\n                'GMT': 0,\n                'CET': 1,\n                'IST': 5.5,\n                'JST': 9,\n                'AEST': 10\n            };\n            return offsets[timeZone] || 0;\n        }\n\n        timezoneSelector.addEventListener('change', updateClock);\n        toggleFormatButton.addEventListener('click', () => {\n            is12HourFormat = !is12HourFormat;\n            updateClock();\n        });\n\n        setInterval(updateClock, 1000);\n        updateClock();\n    <\/script>\n</body>\n</html>
