<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }
        .product {
            border: 1px solid #ccc;
            border-radius: 5px;
            margin: 15px 0;
            padding: 10px;
            text-align: center;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Fragrance Store</h1>
    </header>
    <div class="container">
        <h2>Our Fragrances</h2>
        <div class="product">
            <h3>Floral Essence</h3>
            <p>Price: $50</p>
            <button onclick="alert('Floral Essence added to cart!')">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Woody Charm</h3>
            <p>Price: $60</p>
            <button onclick="alert('Woody Charm added to cart!')">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Citrus Breeze</h3>
            <p>Price: $45</p>
            <button onclick="alert('Citrus Breeze added to cart!')">Add to Cart</button>
        </div>
    </div>
</body>
</html>
